name: Sync, update commit, and publish Docker image

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0
          ref: main # 👈 Explicitly targets the main branch to avoid detached HEAD states

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/psybers/actual-helpers.git
          git fetch upstream # 👈 Fixed the typo here from git.fetch

      - name: Merge upstream/main
        run: |
          # Configure Git identity so it can successfully commit the merge
          git config --global user.name 'deathblade666'
          git config --global user.email 'halo2ofdeath@gmail.com'
          
          # 👈 Safely merges upstream changes into your main branch without wiping customizations
          git merge upstream/main --no-edit 

      - name: Fetch latest Actual commit SHA
        run: |
          curl -sL https://api.github.com/repos/actualbudget/actual/commits \
          | jq -r ".[0].sha" > actual-latest.txt

      - name: Check for modified files
        id: git-check
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "modified=false" >> $GITHUB_OUTPUT
          else
            echo "modified=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        run: |
          # Configure Git identity again just in case the merge didn't require a commit
          git config --global user.name 'deathblade666'
          git config --global user.email 'halo2ofdeath@gmail.com'
          
          # Only create a commit if actual-latest.txt was actually changed by the step above
          if [ "${{ steps.git-check.outputs.modified }}" = "true" ]; then
            git commit -am "Update Actual commit SHA"
          fi
          
          # 👈 SAFE PUSH: Pushes standard merge & updates without overwriting history
          git push origin HEAD:main

      # -------------------------------
      # Build & Publish Docker Image
      # -------------------------------

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.PAT }}" | docker login ghcr.io -u deathblade666 --password-stdin

      - name: Build Docker image
        run: |
          COMMIT_SHA=$(cat actual-latest.txt)
          docker build -t ghcr.io/deathblade666/actual-helper-nightly:latest .
          docker tag ghcr.io/deathblade666/actual-helper-nightly:latest \
                     ghcr.io/deathblade666/actual-helper-nightly:${COMMIT_SHA}

      - name: Push Docker image to GHCR
        run: |
          COMMIT_SHA=$(cat actual-latest.txt)
          docker push ghcr.io/deathblade666/actual-helper-nightly:latest
          docker push ghcr.io/deathblade666/actual-helper-nightly:${COMMIT_SHA}
